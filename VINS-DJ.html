<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VinS — DJ Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Barlow+Condensed:wght@300;400;500;600;700&family=Courier+Prime:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #08070A;
  --card:  #0F0E13;
  --card2: #161520;
  --b1:    rgba(255,255,255,0.07);
  --b2:    rgba(255,255,255,0.13);
  --gold:  #E8A020;
  --red:   #C0392B;
  --red2:  #E74C3C;
  --text:  #F0EDE8;
  --muted: rgba(240,237,232,0.4);
  --green: #4CAF50;
  --blue:  #5BA4CF;
  --amber: #E8A020;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: "Barlow Condensed", sans-serif; overflow: hidden; }

/* ── LOGIN ── */
#login {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center; padding: 28px;
}
.login-card {
  width: 100%; max-width: 340px;
  background: var(--card); border: 1px solid var(--b2); border-radius: 18px;
  padding: 32px 28px; position: relative; overflow: hidden;
}
.login-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.login-logo { font-family: "Abril Fatface", serif; font-size: 30px; color: var(--gold); text-align: center; margin-bottom: 4px; }
.login-sub  { text-align: center; font-family: "Courier Prime", monospace; font-size: 11px; color: var(--muted); margin-bottom: 24px; font-style: italic; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: "Courier Prime", monospace; }
.field input, .field select {
  width: 100%; background: var(--card2); border: 1px solid var(--b1); border-radius: 8px;
  padding: 11px 13px; color: var(--text);
  font-family: "Barlow Condensed", sans-serif; font-size: 15px; font-weight: 500;
  outline: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: rgba(232,160,32,0.4); }
.field select option { background: var(--card2); }
.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #8B0000, var(--red));
  border: none; border-radius: 9px; color: var(--text);
  font-family: "Barlow Condensed", sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; cursor: pointer; margin-top: 4px;
}
.login-btn:disabled { opacity: 0.6; cursor: default; }
.login-status { text-align: center; font-size: 11px; color: var(--muted); font-family: "Courier Prime", monospace; margin-top: 9px; min-height: 16px; }
.login-status.error { color: var(--red2); }

/* ── DASHBOARD ── */
#dashboard {
  display: grid;
  grid-template-rows: 50px 1fr;
  height: 100vh;
}

/* Header */
.dash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; border-bottom: 1px solid var(--b1);
  background: rgba(8,7,10,0.96); gap: 12px;
  flex-shrink: 0;
}
.header-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.header-logo  { font-family: "Abril Fatface", serif; font-size: 19px; color: var(--gold); }
.header-venue { font-size: 10px; font-family: "Courier Prime", monospace; color: var(--muted); }
.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(76,175,80,0.09); border: 1px solid rgba(76,175,80,0.27);
  border-radius: 100px; padding: 4px 11px;
  font-family: "Courier Prime", monospace; font-size: 10px; letter-spacing: .09em; text-transform: uppercase; color: var(--green);
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-stats { display: flex; gap: 16px; }
.stat-num   { font-family: "Abril Fatface", serif; font-size: 20px; line-height: 1; text-align: center; }
.stat-label { font-size: 9px; font-family: "Courier Prime", monospace; color: var(--muted); letter-spacing: .09em; text-transform: uppercase; }
.end-btn {
  padding: 5px 13px; background: rgba(192,57,43,0.09); border: 1px solid rgba(192,57,43,0.27);
  border-radius: 6px; color: rgba(231,76,60,0.8);
  font-family: "Barlow Condensed", sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase; cursor: pointer; flex-shrink: 0;
}

/* Body */
.dash-body {
  display: grid;
  grid-template-columns: 1fr 260px;
  overflow: hidden;
}

/* Queue column */
.queue-col { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--b1); }

/* Now Playing bar */
.np-bar {
  background: linear-gradient(135deg, rgba(192,57,43,0.14), rgba(139,0,0,0.06));
  border-bottom: 1px solid rgba(192,57,43,0.2);
  padding: 10px 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.np-info  { flex: 1; min-width: 0; }
.np-label {
  font-size: 9px; letter-spacing: .17em; text-transform: uppercase;
  font-family: "Courier Prime", monospace; color: rgba(231,76,60,0.72);
  display: flex; align-items: center; gap: 4px; margin-bottom: 2px;
}
.np-label::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--red2); animation: pulse 1.5s ease-in-out infinite; }
.np-title  { font-family: "Abril Fatface", serif; font-size: 17px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-meta   { font-size: 11px; color: var(--muted); font-family: "Courier Prime", monospace; margin-top: 2px; }
.np-reacts { display: flex; gap: 4px; flex-shrink: 0; }
.np-react  { display: flex; align-items: center; gap: 2px; padding: 3px 6px; border-radius: 5px; background: rgba(255,255,255,0.03); border: 1px solid var(--b1); font-size: 12px; }
.np-react span { font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); }

/* Set Now Playing */
.set-np { padding: 10px 14px; border-bottom: 1px solid var(--b1); flex-shrink: 0; background: var(--card); }
.set-np-label { font-size: 9px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: "Courier Prime", monospace; }
.set-np-row { display: flex; gap: 7px; }
.set-np-input {
  flex: 1; background: var(--card2); border: 1px solid var(--b1); border-radius: 7px;
  padding: 8px 11px; color: var(--text);
  font-family: "Barlow Condensed", sans-serif; font-size: 14px; font-weight: 500; outline: none;
}
.set-np-input:focus { border-color: rgba(231,76,60,0.32); }
.set-np-input::placeholder { color: rgba(240,237,232,0.17); }
.set-np-btn {
  padding: 8px 14px; background: linear-gradient(135deg, var(--red), #8B0000);
  border: none; border-radius: 7px; color: var(--text);
  font-family: "Barlow Condensed", sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .07em; cursor: pointer; white-space: nowrap;
}

/* Queue header */
.queue-header {
  padding: 9px 15px 7px; border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.queue-header-left { display: flex; align-items: center; gap: 7px; }
.queue-label  { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-family: "Courier Prime", monospace; }
.queue-badge  { font-family: "Courier Prime", monospace; font-size: 10px; background: rgba(232,160,32,0.09); border: 1px solid rgba(232,160,32,0.27); color: var(--gold); padding: 2px 7px; border-radius: 100px; }
.clear-btn {
  padding: 3px 9px; background: rgba(192,57,43,0.07); border: 1px solid rgba(192,57,43,0.17);
  border-radius: 5px; color: rgba(231,76,60,0.65);
  font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase; cursor: pointer;
}

/* Queue list */
.queue-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
.queue-list::-webkit-scrollbar { width: 3px; }
.queue-list::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
.queue-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.queue-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: .3; }
.queue-empty p { font-size: 13px; font-weight: 300; font-family: "Courier Prime", monospace; line-height: 1.6; }

/* Queue card */
.q-card { background: var(--card); border: 1px solid var(--b1); border-radius: 10px; padding: 11px 12px; animation: slideIn .22s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
.q-card-top    { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 5px; }
.q-card-info   { flex: 1; min-width: 0; }
.q-card-song   { font-size: 15px; font-weight: 700; line-height: 1.2; }
.q-card-artist { font-size: 11px; color: var(--muted); font-family: "Courier Prime", monospace; margin-top: 1px; }
.q-card-orig   { font-size: 10px; color: rgba(240,237,232,0.2); font-family: "Courier Prime", monospace; margin-top: 1px; }
.q-card-table  { font-family: "Courier Prime", monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }
.q-chips       { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
.chip { font-family: "Courier Prime", monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--b1); color: var(--muted); }
.chip-dur   { border-color: rgba(91,164,207,0.28); color: rgba(91,164,207,0.75); background: rgba(91,164,207,0.05); }
.chip-mb    { border-color: rgba(99,102,241,0.22); color: rgba(99,102,241,0.7);  background: rgba(99,102,241,0.04); }
.chip-guest { border-color: rgba(232,160,32,0.17); color: rgba(232,160,32,0.62); background: rgba(232,160,32,0.04); }
.q-actions { display: flex; gap: 4px; }
.q-action {
  flex: 1; padding: 7px 2px; border-radius: 6px; border: 1px solid transparent;
  font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; cursor: pointer; text-align: center;
}
.act-play   { background: rgba(76,175,80,0.09);   border-color: rgba(76,175,80,0.27);   color: var(--green); }
.act-play:hover { background: rgba(76,175,80,0.18); }
.act-later  { background: rgba(232,160,32,0.07);  border-color: rgba(232,160,32,0.22);  color: var(--amber); }
.act-review { background: rgba(91,164,207,0.07);  border-color: rgba(91,164,207,0.22);  color: var(--blue);  }
.act-pass   { background: rgba(192,57,43,0.07);   border-color: rgba(192,57,43,0.17);   color: var(--red2);  }
.act-played { background: rgba(150,100,200,0.07); border-color: rgba(150,100,200,0.25); color: rgba(180,140,220,0.9); }

/* Sidebar */
.sidebar { overflow-y: auto; padding: 12px; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
.sidebar-title { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-family: "Courier Prime", monospace; margin-bottom: 9px; padding-bottom: 7px; border-bottom: 1px solid var(--b1); }
.history-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--b1); }
.history-num  { font-family: "Abril Fatface", serif; font-size: 13px; color: var(--muted); min-width: 16px; text-align: right; flex-shrink: 0; }
.history-song { font-size: 12px; font-weight: 600; color: rgba(240,237,232,0.7); }
.history-meta { font-family: "Courier Prime", monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
.history-tag  { margin-left: auto; font-family: "Courier Prime", monospace; font-size: 9px; padding: 2px 5px; border-radius: 100px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .06em; }
.tag-req { background: rgba(192,57,43,0.09); color: rgba(231,76,60,0.8); border: 1px solid rgba(192,57,43,0.17); }
.tag-dj  { background: rgba(255,255,255,0.03); color: var(--muted); border: 1px solid var(--b1); }

/* Toast */
.toast {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--card2); border: 1px solid var(--b2);
  border-radius: 8px; padding: 9px 15px; font-size: 13px;
  z-index: 500; transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; backdrop-filter: blur(20px);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">VinS</div>
    <div class="login-sub">DJ Dashboard · Hidden Place</div>
    <div class="field">
      <label for="dj-name-input">Your DJ Name</label>
      <input type="text" id="dj-name-input" placeholder="e.g. DJ Phantom" autocomplete="off"/>
    </div>
    <div class="field">
      <label for="venue-select">Venue</label>
      <select id="venue-select">
        <option value="hidden-place">Hidden Place — Balewadi High Street</option>
      </select>
    </div>
    <button class="login-btn" id="go-live-btn">Go Live ⚡</button>
    <div class="login-status" id="login-status"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <header class="dash-header">
    <div class="header-left">
      <div>
        <div class="header-logo">VinS</div>
        <div class="header-venue">Hidden Place</div>
      </div>
      <div class="live-pill">
        <div class="live-dot"></div>
        <span id="header-dj-name">DJ</span> · Live
      </div>
    </div>
    <div class="header-stats">
      <div>
        <div class="stat-num" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div>
        <div class="stat-num" id="stat-played">0</div>
        <div class="stat-label">Played</div>
      </div>
      <div>
        <div class="stat-num" id="stat-reacts" style="color:var(--gold)">0</div>
        <div class="stat-label">Reactions</div>
      </div>
    </div>
    <button class="end-btn" id="end-btn">End Session</button>
  </header>

  <div class="dash-body">
    <div class="queue-col">

      <!-- Now Playing -->
      <div class="np-bar">
        <div class="np-info">
          <div class="np-label">Now Playing</div>
          <div class="np-title" id="np-title">—</div>
          <div class="np-meta"  id="np-meta"></div>
        </div>
        <div class="np-reacts">
          <div class="np-react">🔥<span id="np-fire">0</span></div>
          <div class="np-react">❤️<span id="np-love">0</span></div>
          <div class="np-react">😐<span id="np-meh">0</span></div>
        </div>
      </div>

      <!-- Set Now Playing -->
      <div class="set-np">
        <div class="set-np-label">Set Now Playing</div>
        <div class="set-np-row">
          <input class="set-np-input" id="np-input" type="text" placeholder="Song name or artist..."/>
          <button class="set-np-btn" id="np-play-btn">▶ Play</button>
        </div>
      </div>

      <!-- Queue header -->
      <div class="queue-header">
        <div class="queue-header-left">
          <span class="queue-label">Requests</span>
          <span class="queue-badge" id="queue-badge">0</span>
        </div>
        <button class="clear-btn" id="clear-btn">Clear All</button>
      </div>

      <!-- Queue list -->
      <div class="queue-list" id="queue-list">
        <div class="queue-empty">
          <div class="queue-empty-icon">🎸</div>
          <p>No requests yet.<br>The floor is yours.</p>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">Tonight's Playlist</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc,
         updateDoc, setDoc, query, where, serverTimestamp, getDoc, getDocs }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Firebase ──
const db    = getFirestore(initializeApp({apiKey:"AIzaSyAqBkxofG2zyJSpKYFUG4OnNBANjrc-Qok",authDomain:"vtest-c064b.firebaseapp.com",projectId:"vtest-c064b",storageBucket:"vtest-c064b.firebasestorage.app",messagingSenderId:"226302770597",appId:"1:226302770597:web:f44a2180ee937f8a727c4c"}));

// ── State ──
let sid      = null;
let venue    = "hidden-place";
let djName   = "";
let queue    = [];
let played   = 0;
let unsubReq = null;
let songCount = {}; // tracks duplicate request counts for sorting + badges

// MusicBrainz removed — show exactly what guest typed

// ── Boot — check for saved session ──
window.addEventListener("load", async () => {
  const saved = localStorage.getItem("vins_dj_session");
  if (!saved) return;
  const s = JSON.parse(saved);
  try {
    const snap = await getDoc(doc(db, "sessions", s.sid));
    if (!snap.exists() || !snap.data().isLive) {
      localStorage.removeItem("vins_dj_session");
      return;
    }
  } catch (e) { console.warn("Session check:", e.message); }
  sid    = s.sid;
  djName = s.djName;
  venue  = s.venue;
  showDashboard();
  restoreState();
  startListeners();
  toast("Welcome back, " + djName + " ⚡");
});

// ── Go Live ──
document.getElementById("go-live-btn").addEventListener("click", startSession);
document.getElementById("dj-name-input").addEventListener("keydown", e => { if (e.key === "Enter") startSession(); });

async function startSession() {
  const name = document.getElementById("dj-name-input").value.trim();
  if (!name) { toast("Enter your DJ name"); return; }
  djName = name;
  venue  = document.getElementById("venue-select").value;

  const btn = document.getElementById("go-live-btn");
  const st  = document.getElementById("login-status");
  btn.disabled   = true;
  st.textContent = "Connecting...";
  st.className   = "login-status";

  try {
    // Kill ALL existing live sessions for this venue first
    // This prevents ghost sessions confusing the guest page
    const oldSessions = await getDocs(query(collection(db, "sessions"),
      where("venueId", "==", venue), where("isLive", "==", true)));
    for (const s of oldSessions.docs) {
      await updateDoc(doc(db, "sessions", s.id), { isLive: false, endedAt: serverTimestamp() }).catch(() => {});
    }

    const now = new Date();
    const sessionDate = now.toISOString().split("T")[0];
    const ref = await addDoc(collection(db, "sessions"), {
      venueId:   venue,
      venueName: "Hidden Place",
      djName,
      startTime: now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true }),
      isLive:    true,
      date:      sessionDate,
      createdAt: serverTimestamp()
    });
    sid = ref.id;
    localStorage.setItem("vins_dj_session", JSON.stringify({ sid, djName, venue }));
    showDashboard();
    startListeners();
    toast("Session live — go, " + djName + "! 🎧");
  } catch (err) {
    st.textContent = "Error: " + err.message;
    st.className   = "login-status error";
    btn.disabled   = false;
    console.error(err);
  }
}

// ── End Session ──
document.getElementById("end-btn").addEventListener("click", async () => {
  if (!confirm("End session and log out?")) return;
  if (sid) await updateDoc(doc(db, "sessions", sid), { isLive: false, endedAt: serverTimestamp() }).catch(() => {});
  localStorage.removeItem("vins_dj_session");
  localStorage.removeItem("vins_dj_hist_" + sid);
  if (unsubReq) unsubReq();
  sid = null; queue = []; played = 0;
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login").style.display     = "";
  document.getElementById("dj-name-input").value     = "";
  document.getElementById("login-status").textContent = "";
  document.getElementById("go-live-btn").disabled    = false;
  document.getElementById("history-list").innerHTML  = "";
});

// ── Listeners ──
function startListeners() {
  if (unsubReq) unsubReq();

  const q = query(collection(db, "requests"), where("venueId", "==", venue));
  unsubReq = onSnapshot(q, snap => {
    const allPending = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(r => r.sessionId === sid && r.status === "pending")
      .sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

    // Count how many times each song was requested (normalised lowercase)
    const songCount = {};
    allPending.forEach(r => {
      const key = r.songQuery.toLowerCase().trim();
      songCount[key] = (songCount[key] || 0) + 1;
    });
    // Sort: most requested first, then by time
    const pending = [...allPending].sort((a, b) => {
      const ca = songCount[a.songQuery.toLowerCase().trim()] || 1;
      const cb = songCount[b.songQuery.toLowerCase().trim()] || 1;
      if (cb !== ca) return cb - ca; // more requests = higher
      return (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0);
    });

    // Capture new items BEFORE any async work
    const existingIds = new Set(queue.map(r => r.id));
    const newItems    = pending.filter(r => !existingIds.has(r.id));

    // Update queue immediately so removals (accepted/passed) show up right away
    queue = pending;
    renderQueue();
    newItems.forEach(r => toast('♪ New: "' + r.songQuery + '"'));

    // No enrichment — show exactly what guest typed
  }
  }, err => console.error("Listener:", err.code, err.message));

  // Reactions on Now Playing
  onSnapshot(doc(db, "nowplaying", venue), snap => {
    if (!snap.exists()) return;
    const r = snap.data().reactions || {};
    document.getElementById("np-fire").textContent = r.fire || 0;
    document.getElementById("np-love").textContent = r.love || 0;
    document.getElementById("np-meh").textContent  = r.meh  || 0;
    document.getElementById("stat-reacts").textContent = (r.fire||0) + (r.love||0) + (r.meh||0);
  });
}

// ── Restore state on refresh ──
function restoreState() {
  getDoc(doc(db, "nowplaying", venue)).then(snap => {
    if (snap.exists() && snap.data().sessionId === sid) {
      const d = snap.data();
      document.getElementById("np-title").textContent = d.song || "—";
      document.getElementById("np-meta").textContent  = [d.artist, d.duration].filter(Boolean).join(" · ");
    }
  }).catch(() => {});

  try {
    const history = JSON.parse(localStorage.getItem("vins_dj_hist_" + sid) || "[]");
    played = history.length;
    document.getElementById("stat-played").textContent = played;
    history.forEach((item, i) => addHistoryRow(i + 1, item, false));
  } catch (e) {}
}

// ── Render Queue ──
function renderQueue() {
  const list = document.getElementById("queue-list");
  document.getElementById("stat-pending").textContent = queue.length;
  document.getElementById("queue-badge").textContent  = queue.length;

  if (!queue.length) {
    list.innerHTML = `<div class="queue-empty"><div class="queue-empty-icon">🎸</div><p>No requests yet.<br>The floor is yours.</p></div>`;
    return;
  }

  list.innerHTML = "";
  queue.forEach(r => {
    // Show resolved title only if MB found something AND it's a real song name (not same as query)
    const displayTitle  = r.songQuery;
    const displayArtist = "";
    const guestChip = (r.guestAge || r.guestGender)
      ? `<span class="chip chip-guest">👤 ${[r.guestAge, r.guestGender].filter(Boolean).join(" · ")}</span>` : "";

    const card = document.createElement("div");
    card.className = "q-card";
    card.innerHTML = `
      <div class="q-card-top">
        <div class="q-card-info">
          <div class="q-card-song">${esc(displayTitle)} ${songCount[r.songQuery.toLowerCase().trim()] > 1 ? `<span style="background:rgba(232,160,32,0.2);border:1px solid rgba(232,160,32,0.4);color:#E8A020;font-size:10px;padding:1px 6px;border-radius:10px;font-family:'Courier Prime',monospace;margin-left:4px">${songCount[r.songQuery.toLowerCase().trim()]}x</span>` : ""}</div>
          ${displayArtist ? `<div class="q-card-artist">${esc(displayArtist)}</div>` : ""}

        </div>
        <div class="q-card-table">${r.tableNumber && r.tableNumber !== "?" ? "T" + r.tableNumber : ""}</div>
      </div>
      <div class="q-chips">

        ${guestChip}
      </div>
      <div class="q-actions">
        <button class="q-action act-play"    data-id="${r.id}">✓ Accept</button>
        <button class="q-action act-later"   data-id="${r.id}">⏱ Later</button>
        <button class="q-action act-played"  data-id="${r.id}">↩ Already Played</button>
        <button class="q-action act-pass"    data-id="${r.id}">✕ Pass</button>
      </div>`;

    card.querySelector(".act-play").addEventListener("click",   () => respond(r, "accepted"));
    card.querySelector(".act-later").addEventListener("click",  () => respond(r, "later"));
    card.querySelector(".act-played").addEventListener("click", () => respondAlreadyPlayed(r));
    card.querySelector(".act-pass").addEventListener("click",   () => respond(r, "passed"));
    // No Review button — replaced by Already Played

    list.appendChild(card);
  });
}

// ── Already Played — mark as passed, give guest +1 request back ──
async function respondAlreadyPlayed(r) {
  await updateDoc(doc(db, "requests", r.id), {
    status: "alreadyplayed",  // distinct status so guest page handles it separately
    respondedAt: serverTimestamp(),
    djMessage: "alreadyplayed"
  }).catch(err => console.error("alreadyplayed:", err));
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  toast(pick(["↩ Already played — guest gets +1","↩ Sent them back for another try","↩ Guest notified — song was already on"]));
}

// ── Respond to request ──
async function respond(r, status) {
  const title  = r.songQuery;
  const artist = "";
  const dur    = "";

  await updateDoc(doc(db, "requests", r.id), {
    status,
    respondedAt:   serverTimestamp(),
    queuePosition: status === "accepted" ? Math.max(1, queue.length) : null,
    djMessage:
      status === "passed" ? "Not quite tonight's vibe — try another!" :
      status === "later"  ? "I'll work it in when the timing is right." :
      status === "reviewing" ? "DJ is checking the track..." : null
  }).catch(err => console.error("respond:", err));

  // ▶ Play = accept the request + add to history
  // DJ still needs to manually hit ▶ Play in "Set Now Playing" when they actually play it
  if (status === "accepted") {
    addHistoryRow(null, { song: title, artist, time: nowTime(), tag: "Requested" }, true);
    const acceptToasts = [
    "✓ Accepted — pre-filled above, hit Play when ready!",
    "✓ They're gonna love you for this one 🤘",
    "✓ Done — guest is hyped. Don't keep them waiting!",
    "✓ Locked in. Floor's about to get it.",
    "✓ Good call. Set Now Playing when you drop it.",
  ];
  toast(acceptToasts[Math.floor(Math.random() * acceptToasts.length)]);
    return;
  }

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const toasts = {
    later:    pick(["⏱ Maybe later — no promises","⏱ Told them it's a maybe","⏱ Not now, possibly later","⏱ No guarantees — they know","⏱ In the maybe pile"]),
    passed:   pick(["✕ Passed — guest notified","✕ Not tonight's vibe","✕ Respectfully declined 😄","✕ Hard pass — they're told","✕ Not this one tonight"])
  };
  toast(toasts[status] || "Done");
}

// ── Set Now Playing manually ──
document.getElementById("np-play-btn").addEventListener("click", setNowPlaying);
document.getElementById("np-input").addEventListener("keydown", e => { if (e.key === "Enter") setNowPlaying(); });

async function setNowPlaying() {
  const song = document.getElementById("np-input").value.trim();
  if (!song) { toast("Enter a song name"); return; }
  await setDoc(doc(db, "nowplaying", venue), {
    song, artist: "", duration: null,
    startedAt: serverTimestamp(), sessionId: sid, djName,
    reactions: { fire: 0, love: 0, meh: 0 }
  }).catch(console.error);
  document.getElementById("np-title").textContent = song;
  document.getElementById("np-meta").textContent  = "";
  document.getElementById("np-input").value       = "";
  addHistoryRow(null, { song, artist: "", time: nowTime(), tag: "DJ Pick" }, true);
  const npToasts = [
    `▶ Now playing: "${song}" — let's go!`,
    `▶ Dropping "${song}" right now 🔥`,
    `▶ "${song}" is on — floor time!`,
    `▶ Playing "${song}" — turn it up!`,
  ];
  toast(npToasts[Math.floor(Math.random() * npToasts.length)]);
}

// ── Clear All ──
document.getElementById("clear-btn").addEventListener("click", async () => {
  if (!queue.length || !confirm(`Clear all ${queue.length} requests?`)) return;
  for (const r of queue) {
    await updateDoc(doc(db, "requests", r.id), { status: "passed" }).catch(() => {});
  }
  queue = [];
  renderQueue();
  toast("Queue cleared");
});

// ── History ──
function addHistoryRow(num, item, saveToStorage) {
  if (saveToStorage) {
    played++;
    document.getElementById("stat-played").textContent = played;
    const k = "vins_dj_hist_" + sid;
    const h = JSON.parse(localStorage.getItem(k) || "[]");
    h.push(item);
    localStorage.setItem(k, JSON.stringify(h));
    num = played;
    document.getElementById("history-list").prepend(makeHistoryEl(num, item));
  } else {
    document.getElementById("history-list").appendChild(makeHistoryEl(num, item));
  }
}

function makeHistoryEl(num, item) {
  const el = document.createElement("div");
  el.className = "history-row";
  el.innerHTML = `
    <div class="history-num">${num}</div>
    <div style="flex:1;min-width:0">
      <div class="history-song">${esc(item.song)}</div>
      <div class="history-meta">${item.artist ? esc(item.artist) + " · " : ""}${item.time}</div>
    </div>
    <button class="hist-now-btn" title="Send Now Playing to guests">▶</button>
    <span class="history-tag ${item.tag === "DJ Pick" ? "tag-dj" : "tag-req"}">${item.tag}</span>`;

  // ▶ Now button — writes to nowplaying so guest phones light up
  el.querySelector(".hist-now-btn").title = "Send Now Playing to guests";
  el.querySelector(".hist-now-btn").addEventListener("click", async () => {
    await setDoc(doc(db, "nowplaying", venue), {
      song: item.song, artist: item.artist || "", duration: null,
      startedAt: serverTimestamp(), sessionId: sid, djName,
      reactions: { fire: 0, love: 0, meh: 0 }
    }).catch(console.error);
    document.getElementById("np-title").textContent = item.song;
    document.getElementById("np-meta").textContent  = item.artist || "";
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    toast(pick([`▶ "${item.song}" — guests notified!`, `🔥 Playing "${item.song}" — they know!`, `🎸 "${item.song}" is live — guests cheering!`]));
  });
  return el;
}

// ── Utilities ──
function showDashboard() {
  document.getElementById("login").style.display     = "none";
  document.getElementById("dashboard").style.display = "";
  document.getElementById("header-dj-name").textContent = djName;
}

function nowTime() {
  return new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true });
}

function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}
</script>
